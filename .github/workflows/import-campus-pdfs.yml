name: Import Campus PDFs

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit the number of PDFs to process (for testing)'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (do not upload or insert)'
        type: boolean
        required: false
        default: true

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run import script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET || 'source-pdfs' }}
        run: |
          OPTIONS=""
          if [ "${{ github.event.inputs.limit }}" != "" ]; then
            OPTIONS="$OPTIONS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            OPTIONS="$OPTIONS --dry-run"
          fi
          python scripts/import_campus_pdfs.py $OPTIONS
