<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Psycho | Landing</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top, #1f2937, #111827 55%);
        color: #f9fafb;
      }

      main {
        text-align: center;
        padding: 2.5rem 2rem;
        border-radius: 16px;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.5rem);
        letter-spacing: 0.04em;
      }

      p {
        margin: 0.75rem 0 0;
        color: #d1d5db;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World 👋</h1>
      <p>Your landing page is live.</p>
    </main>
  </body>
</html>
